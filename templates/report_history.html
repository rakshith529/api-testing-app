{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h2>Generated Reports</h2>
  <div class="d-flex gap-2">
    <a class="btn btn-success" href="{{ url_for('generate_report', fmt='html') }}">Generate HTML</a>
    <a class="btn btn-success" href="{{ url_for('generate_report', fmt='json') }}">Generate JSON</a>
  </div>
</div>

<div class="card">
  <div class="table-responsive">
    <table class="table table-striped mb-0">
      <thead>
        <tr><th>ID</th><th>Format</th><th>File Path</th><th>Created</th></tr>
      </thead>
      <tbody>
      {% for row in reports %}
        <tr>
          <td>{{ row['id'] }}</td>
          <td>{{ row['report_format'] }}</td>
          <td><code>{{ row['file_path'] }}</code></td>
          <td>{{ row['created_at'] }}</td>
        </tr>
      {% else %}
        <tr><td colspan="4" class="text-center text-muted">No reports generated yet.</td></tr>
      {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
